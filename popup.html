<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>MatchTube</title>
</head>

<body>
    <header>
        <h1>Match<span class="red">Tube</span></h1>
        <div id="nav">
            <!-- current video iconbtn -->
            <div id="current-video-icon-btn" class="icon-btn active-icon-btn" title="Current Video">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33A2.78 2.78 0 0 0 3.4 19c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.25 29 29 0 0 0-.46-5.33z" />
                    <polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02" />
                </svg>
            </div>
            <!-- all videos iconbtn -->
            <div id="matches-icon-btn" class="icon-btn" title="All Matches">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                    <circle cx="9" cy="7" r="4" />
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                    <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                </svg>
            </div>
            <!-- settings iconbtn -->
            <div id="settings-icon-btn" class="icon-btn" title="Settings">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3" />
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
                </svg>
            </div>
        </div>
    </header>

    <main>
        <div id="current-video-page">
            <h2>Active Video Matches</h2>
            <div id="matchResults"></div>
            <div id="matchStatus">Loading matches...</div>
        </div>

        <div id="matches-page" class="hidden">
            <h2>Global Matches</h2>
            <button id="find-matches-btn" class="button">Refresh All Matches</button>
            <div id="find-matches-status"></div>
            <div id="find-matches-results"></div>
        </div>

        <div id="settings-page" class="hidden">
            <h2>Settings</h2>
            <div class="input-row">
                <label for="usernameInput">Display Name</label>
                <input type="text" id="usernameInput" placeholder="How others see you">
            </div>
            <div class="input-row">
                <label for="urlInput">Supabase URL</label>
                <input type="password" id="urlInput" placeholder="https://xyz.supabase.co">
            </div>
            <div class="input-row">
                <label for="keyInput">Supabase API Key</label>
                <input type="password" id="keyInput" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6...">
            </div>
            <button id="saveButton" class="button">Save Configuration</button>
        </div>

    </main>

    <script src="popup.js"></script>
</body>

</html>
